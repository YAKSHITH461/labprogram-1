
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Shop</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Header -->
    <header>
        <h1>MyShop</h1>
        <nav>
            <a href="#">Home</a>
            <a href="#">Products</a>
            <a href="#">Cart</a>
            <a href="#">Contact</a>
        </nav>
    </header>

    <!-- Hero Section -->
    <section class="hero">
        <h2>Welcome to MyShop</h2>
        <p>Best products at the best prices</p>
    </section>

    <!-- Products Section -->
    <section class="products">
        <div class="product-card">
            <img src="https://mobileleb.com/cdn/shop/files/apple-mobile-phone-apple-iphone-15-128gb-33291194957956_1200x1200.jpg?v=1765978868" alt="Product 1">
            <h3>apple mobile</h3>
            <p>$100.00</p>
            <button>Add to Cart</button>
        </div>

        <div class="product-card">
            <img src="https://www.top10mobileshop.com/images/top10mobiles.com/thumbnail/product/2024/08/250607926202408060926.jpg" alt="Product 2">
            <h3>samsung mobile</h3>
            <p>$120.00</p>
            <button>Add to Cart</button>
        </div>

        <div class="product-card">
            <img src="https://media-ik.croma.com/prod/https://media.tatacroma.com/Croma%20Assets/Communication/Mobiles/Images/304505_0_ujunv0.png" alt="Product 3">
            <h3>realme mobile</h3>
            <p>$80.00</p>
            <button>Add to Cart</button>
        </div>
		
		 <div class="product-card">
            <img src="https://priceinall.com/wp-content/uploads/2024/02/Xiaomi-14-Ultra-White-Color.jpg" alt="Product 4">
            <h3>xiaomi 17 ultra</h3>
            <p>$100.00</p>
            <button>Add to Cart</button>
        </div>
    </section>

    <!-- Footer -->
    <footer>
        <p>© 2026 MyShop. All rights reserved.</p>
    </footer>

</body>
</html>
